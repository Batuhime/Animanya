<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animanya | Hell's Paradise 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span class="dragon-icon">🐉</span> ANIMANYA
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active">Ana Sayfa</a></li>
            <li><a href="#">Seriler</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="player-section">
            <div class="video-wrapper">
                <iframe id="main-player" src="" width="100%" height="100%" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
            
            <div class="video-info">
                <h1 id="episode-title">Yükleniyor...</h1>
                <p id="episode-desc">Bölüm seçimi yapıldığında açıklama burada görünecek.</p>
                <div class="tags">
                    <span class="tag">#HellsParadise</span>
                    <span class="tag">#Sezon2</span>
                    <span class="tag" id="current-ep-tag">Bölüm: -</span>
                </div>
            </div>
        </section>

        <aside class="sidebar">
            <h3>Bölüm Seçimi (12 Bölüm)</h3>
            <div class="episode-list" id="episode-list-container">
                </div>
        </aside>
    </main>

    <script>
        // --- BURAYI GÜNCELLEMEN YETERLİ ---
        const animeData = {
            seriesName: "Hell's Paradise: Jigokuraku Sezon 2",
            episodes: [
                { id: "1WNYGeEuiwSpvyBT4zMiBeSpzvUTcSVL_", title: "Bölüm 1: Cennetin Kıyısında", desc: "Ada macerası kaldığı yerden devam ediyor. İlk karşılaşmalar her zaman zordur." },
                { id: "16AmosAl29hdr8LCPyUP-t0jzZI0kmJZY", title: "Bölüm 2: Gölgelerin Dansı", desc: "Gabimaru yeteneklerini bir kez daha sergiliyor." },
                { id: "1z-L5dZ84Tspf5ubKOnAggveRPfgnUUqT", title: "Bölüm 3: Tao'nun Gizemi", desc: "Gücün gerçek kaynağı yavaş yavaş ortaya çıkıyor." },
                { id: "1jheUNN6EIXYDHF6xgQ6xzo1tC8nYSmDy", title: "Bölüm 4: Askerde daşşak kokusu", desc: "-." },
                { id: "1_lLf5eRWPn874LCh4P4E9ZU1ByvCLS1d", title: "Bölüm 5: Askerde ayak kokusu", desc: "-." },
                { id: "1x2kdnAVRxjSP1uIiiwW6ps-8cmoaNikK", title: "Bölüm 6: Komutanın Hanımı oldu", desc: "-." },
                { id: "1UkLe4di929cGv3q8pVrtiDZ3_u8ybyi3", title: "Bölüm 7: Komutanın Yatağına giriyor", desc: "-." },
                { id: "1_nfW5jtk6H9MhGm0fKTW2mQIx4lDwjA_", title: "Bölüm 8: Bamya Taciri Gabimaru", desc: "-." },
                { id: "1OMrIB4BxUwg86coZ3FFa7tfRz7-4hcyc", title: "Bölüm 9: Dostunu Bekleyen Gabimaru", desc: "-." },
                { id: "1tSbdK_zff02MVBVLfUFs5H6HLQKqGO0Q", title: "Bölüm 10: Gabimaru Askerde", desc: "-." },
                { id: "", title: "Bölüm 11: Askerde daşşak kokusu", desc: "yakıda." },
                { id: "", title: "Bölüm 12: Askerde daşşak kokusu", desc: "yakıda." },
                { id: "", title: "Bölüm 13: Askerde daşşak kokusu", desc: "yakıda." },
                
                // Buraya 12. bölüme kadar aynı formatta ekleme yapabilirsin
            ]
        };

        const player = document.getElementById('main-player');
        const titleDisplay = document.getElementById('episode-title');
        const descDisplay = document.getElementById('episode-desc');
        const epTag = document.getElementById('current-ep-tag');
        const listContainer = document.getElementById('episode-list-container');

        // Bölümleri Listeleme Fonksiyonu
        function initApp() {
            animeData.episodes.forEach((ep, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="thumbnail">${index + 1}</div>
                    <div class="card-info">
                        <h4>${ep.title}</h4>
                        <p>İzlemek için tıkla</p>
                    </div>
                `;
                card.onclick = () => loadEpisode(index);
                listContainer.appendChild(card);
            });
            // İlk bölümü otomatik yükle
            loadEpisode(0);
        }

        // Bölüm Değiştirme Fonksiyonu
        function loadEpisode(index) {
            const ep = animeData.episodes[index];
            player.src = `https://drive.google.com/file/d/${ep.id}/preview`;
            titleDisplay.innerText = ep.title;
            descDisplay.innerText = ep.desc;
            epTag.innerText = `Bölüm: ${index + 1}`;
            
            // Aktif kartı işaretleme
            document.querySelectorAll('.video-card').forEach((c, i) => {
                c.classList.toggle('active-card', i === index);
            });
        }

        initApp();
    </script>
</body>
</html>
